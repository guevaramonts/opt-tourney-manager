services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opt_app
      POSTGRES_USER: opt_user
      POSTGRES_PASSWORD: opt_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opt_user -d opt_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: opt_app
      DB_USER: opt_user
      DB_PASSWORD: opt_dev_password
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
